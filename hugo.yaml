baseURL: "https://eonh1u.github.io/"
title: "eonh1u Blog"
theme: ["PaperMod"]

pagination:
  pagerSize: 10

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

languages:
  zh-cn:
    languageName: "中文"
    weight: 1
    taxonomies:
      category: categories
      tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: 首页
      url: /
      weight: 1
    - name: 归档
      url: /archives/
      weight: 5
    - name: 标签
      url: /tags/
      weight: 10
    - name: 分类
      url: /categories/
      weight: 15
    - name: 搜索
      url: /search/
      weight: 20
    - name: 关于
      url: /about/
      weight: 25

params:
  env: production
  description: "eonh1u 的技术博客 - 分享与探索"
  author: "eonh1u"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false
  comments: false

  assets:
    disableHLJS: true

  homeInfoParams:
    Title: "Hi, I'm eonh1u"
    Content: "Geek | Developer | Explorer"

  socialIcons:
    - name: github
      url: "https://github.com/Eonh1u"

  giscus:
    repo: "Eonh1u/Eonh1u.github.io"
    repoId: "<从 giscus.app 获取>"
    category: "Announcements"
    categoryId: "<从 giscus.app 获取>"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "zh-CN"
    loading: "lazy"

  umami:
    websiteId: "<从 Umami 后台获取>"
    src: "https://你的umami域名/script.js"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: dracula
