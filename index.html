<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eonh1u Terminal</title>
    <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
    <div id="terminal-container">
        <div id="terminal-header">
            <div class="terminal-buttons">
                <span class="btn-close"></span>
                <span class="btn-minimize"></span>
                <span class="btn-maximize"></span>
            </div>
            <div class="terminal-title">eonh1u@terminal: ~</div>
        </div>
        <div id="terminal-body">
            <div id="output"></div>
            <div id="input-line">
                <span class="prompt">visitor@eonh1u:~$&nbsp;</span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
                <span id="cursor-block" class="cursor-blink">_</span>
            </div>
        </div>
    </div>
    <script src="js/terminal.js"></script>
</body>
</html>
